<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }
    img {
      width: 500px;
      height: 500px;
      object-fit: contain;
    }
    #redirect-text {
      margin-top: 24px;
      color: #ccc;
      font-size: 18px;
      letter-spacing: 0.05em;
    }
    #countdown {
      display: inline-block;
      color: #fff;
      font-weight: bold;
      font-size: 22px;
      min-width: 1ch;
      opacity: 1;
      transition: opacity 0.25s ease-out, transform 0.25s ease-out;
      transform: scale(1);
    }
    #countdown.tick {
      opacity: 0;
      transform: scale(1.6);
    }
  </style>
</head>
<body>
  <img src="devtriplesecops.png" alt="Splash">
  <p id="redirect-text">Redirecting to simonmerrick.com in <span id="countdown">3</span></p>
  <script>
    const el = document.getElementById('countdown');
    let count = 3;

    function tick() {
      el.classList.add('tick');
      setTimeout(() => {
        count--;
        if (count <= 0) {
          window.location.href = 'https://simonmerrick.com';
          return;
        }
        el.textContent = count;
        el.classList.remove('tick');
        setTimeout(tick, 1000);
      }, 250);
    }

    setTimeout(tick, 1000);
  </script>
</body>
</html>
